[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Replace YOUR-PROJECT-REF with your Supabase project ref (e.g. hfugsfbtuykrzrzzabsi)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://YOUR-PROJECT-REF.supabase.co https://accounts.google.com; frame-ancestors 'none'"

# SPA routing — serve index.html for all routes not matched by a static file
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
